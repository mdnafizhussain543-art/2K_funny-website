<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funny Name Prank</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ffffff, #eef3ff 55%, #dbe7ff 100%);
      overflow: hidden;
      padding: 20px;
    }

    .emoji-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(31, 75, 155, 0.18);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      color: #111827;
    }

    .sub {
      margin-top: 10px;
      color: #5b6473;
      font-size: 16px;
    }

    .input-wrap {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border-radius: 18px;
      border: 2px solid #d9e3f0;
      outline: none;
      text-align: center;
      transition: 0.2s;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.25);
      transition: 0.18s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .result {
      margin-top: 24px;
      display: none;
      padding: 22px 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, #fff1f2, #fef3c7);
      color: #111;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.35;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
      animation: popIn 0.4s ease;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: #d62828;
      font-size: 14px;
      font-weight: 600;
    }

    .tiny-note {
      margin-top: 14px;
      font-size: 13px;
      color: #7b8190;
    }

    .emoji {
      position: absolute;
      top: -40px;
      animation: fall linear forwards;
      opacity: 0.95;
      user-select: none;
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.86);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    @keyframes fall {
      0% {
        transform: translateY(-40px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      .result {
        font-size: 24px;
      }

      button, input {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="emoji-layer" id="emojiLayer"></div>

  <div class="card" id="card">
    <h1>Enter your name 😏</h1>
    <div class="sub">নাম লিখে Enter চাপো</div>

    <div class="input-wrap">
      <input type="text" id="nameInput" placeholder="Write your name" maxlength="20" />
      <button id="enterBtn">Enter</button>
    </div>

    <div class="error" id="errorMsg">আগে একটা নাম লিখো</div>

    <div class="result" id="resultBox"></div>

    <div class="tiny-note">funny prank page</div>
  </div>

  <script>
    const nameInput = document.getElementById("nameInput");
    const enterBtn = document.getElementById("enterBtn");
    const resultBox = document.getElementById("resultBox");
    const errorMsg = document.getElementById("errorMsg");
    const emojiLayer = document.getElementById("emojiLayer");
    const card = document.getElementById("card");

    function makeEmojiRain() {
      const emojis = ["🤡", "😂", "🤣", "😹", "🙈", "🎉"];
      for (let i = 0; i < 35; i++) {
        const el = document.createElement("span");
        el.className = "emoji";
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = (16 + Math.random() * 18) + "px";
        el.style.animationDuration = (2 + Math.random() * 2.2) + "s";
        el.style.animationDelay = (Math.random() * 0.5) + "s";
        emojiLayer.appendChild(el);

        setTimeout(() => {
          el.remove();
        }, 4500);
      }
    }

    function showFunnyText() {
      const name = nameInput.value.trim();

      resultBox.style.display = "none";
      errorMsg.style.display = "none";

      if (!name) {
        errorMsg.style.display = "block";
        return;
      }

      resultBox.innerHTML = `কিরে <span style="color:#7c3aed;">${name}</span> গাগল 🤡`;
      resultBox.style.display = "block";

      card.classList.remove("shake");
      void card.offsetWidth;
      card.classList.add("shake");

      makeEmojiRain();
    }

    enterBtn.addEventListener("click", showFunnyText);

    nameInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        showFunnyText();
      }
    });
  </script>
</body>
</html>
